<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Posts — Bolão CazéTV Copa 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    /* ── TOKENS (CazéTV design system — see cazetv-design-system) ── */
    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --r: 14px;
      --r-lg: 20px;

      --bg: #050b24;
      --surf: #0a1540;
      --surf2: #11205a;
      --surf3: #182b72;
      --border: rgba(255, 255, 255, .08);
      --border2: rgba(255, 255, 255, .16);
      --hi: #ffffff;
      --txt: rgba(255, 255, 255, .9);
      --txt2: rgba(255, 255, 255, .7);
      --txt3: rgba(255, 255, 255, .5);
      --txt4: rgba(255, 255, 255, .3);
      --overlay: rgba(0, 0, 0, .82);
      --shadow: 0 12px 40px rgba(0, 0, 0, .6);
      --cell: #0a1540;
      --cell-off: #050b24;
      --cell-hover: #11205a;
      --cell-spec: rgba(255, 184, 0, .12);
      --cell-spec-hover: rgba(255, 184, 0, .2);
      --hdr-shadow: 0 2px 20px rgba(0, 0, 0, .6);
      --dot-border: rgba(0, 0, 0, .3);
      --red: #ea1d2c;
      --orange: #ff5c00;
      --gold: #ffb800;
      --green: #00d46a;
      --p1: #ffb800;
      --p2: #ff5c00;
      --p3: #00d46a;
      --ig: #d63480;
      --tt: #5bcfdc;
      --xc: #1d9bf0;
      --wa: #25D366;
      --ig-bg: linear-gradient(135deg, #833ab4, #d63480);
      --tt-bg: #010101;
      --xc-bg: #000;
      --wa-bg: #075E54;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh
    }

    /* ── HEADER ── */
    .hdr {
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--hdr-shadow);
      transition: background .25s, border-color .25s
    }

    .hdr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .hdr-left {
      display: flex;
      align-items: baseline;
      gap: 10px
    }

    .logo {
      color: var(--red);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .htitle {
      font-size: 15px;
      font-weight: 700;
      color: var(--hi)
    }

    .hsub {
      font-size: 11px;
      color: var(--txt2)
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .fb {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--txt2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s
    }

    .fb:hover {
      border-color: var(--gold);
      color: var(--hi);
      background: rgba(255, 184, 0, .08)
    }

    .fb.on {
      border-color: transparent;
      color: #fff
    }

    .fb[data-ch=all].on {
      background: var(--orange)
    }

    .fb[data-ch=instagram].on {
      background: linear-gradient(135deg, #833ab4, #d63480)
    }

    .fb[data-ch=tiktok].on {
      background: #010101;
      border: 1px solid var(--tt);
      color: var(--tt)
    }

    .fb[data-ch=x].on {
      background: #0d6fa8
    }

    .fb[data-ch=whatsapp].on {
      background: #128C3E
    }

    .fdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .fd-all {
      background: var(--txt3)
    }

    .fd-ig {
      background: var(--ig)
    }

    .fd-tt {
      background: var(--tt)
    }

    .fd-x {
      background: var(--xc)
    }

    .fd-wa {
      background: var(--wa)
    }

    /* ── WIDGETS (big numbers: publicados / planejados) ── */
    .widgets {
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1fr 1fr;
      gap: 10px
    }

    .widget {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0
    }

    .widget[data-ch=instagram] {
      border-left: 3px solid var(--ig)
    }

    .widget[data-ch=tiktok] {
      border-left: 3px solid var(--tt)
    }

    .widget[data-ch=x] {
      border-left: 3px solid var(--xc)
    }

    .widget[data-ch=whatsapp] {
      border-left: 3px solid var(--wa)
    }

    .widget.w-overall {
      background: linear-gradient(135deg, rgba(255, 92, 0, .16), rgba(255, 184, 0, .1));
      border-color: rgba(255, 184, 0, .3);
      flex-direction: column;
      align-items: flex-start;
      gap: 5px
    }

    .w-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .w-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--txt3);
      white-space: nowrap
    }

    .w-big {
      font-size: 23px;
      font-weight: 800;
      color: var(--hi);
      line-height: 1;
      letter-spacing: -.5px
    }

    .w-big .w-sep {
      color: var(--txt4);
      font-weight: 600;
      margin: 0 2px;
      font-size: 16px
    }

    .w-big .w-all {
      color: var(--txt3);
      font-size: 15px;
      font-weight: 700
    }

    .w-sub {
      font-size: 10px;
      color: var(--txt3)
    }

    .w-bar {
      width: 100%;
      height: 4px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
      margin-top: 3px;
      flex-shrink: 0
    }

    .w-bar-fill {
      height: 100%;
      border-radius: 9999px;
      width: 0%;
      transition: width .5s ease
    }

    .picon.sm {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .35)
    }

    .picon.sm svg {
      width: 18px;
      height: 18px
    }

    @media(max-width:900px) {
      .widgets {
        grid-template-columns: repeat(2, 1fr)
      }

      .widget.w-overall {
        grid-column: 1 / -1
      }
    }

    /* ── CALENDAR ── */
    .cal {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px
    }

    .month-block {
      margin-bottom: 40px
    }

    .month-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--hi);
      margin-bottom: 8px
    }

    .phase-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .pb-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--txt2)
    }

    .pb-swatch {
      width: 20px;
      height: 4px;
      border-radius: 2px
    }

    .wd-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px
    }

    .wd {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--txt3);
      padding: 4px 0
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px
    }

    /* ── DAY CELL ── */
    .dc {
      min-height: 92px;
      padding: 8px 8px 7px;
      border-radius: var(--r);
      background: var(--cell);
      border: 1px solid var(--border);
      position: relative;
      display: flex;
      flex-direction: column;
      transition: background .15s, border-color .15s, box-shadow .15s
    }

    .dc.blank {
      background: transparent;
      border-color: transparent;
      pointer-events: none
    }

    .dc.off {
      background: var(--cell-off);
      border-color: transparent;
      opacity: .4;
      pointer-events: none
    }

    .dc.on {
      cursor: pointer
    }

    .dc.on:hover {
      background: var(--cell-hover);
      border-color: var(--border2);
      box-shadow: var(--shadow)
    }

    .dc.p1 {
      border-left: 3px solid var(--p1)
    }

    .dc.p2 {
      border-left: 3px solid var(--p2)
    }

    .dc.p3 {
      border-left: 3px solid var(--p3)
    }

    .dc.spec {
      background: var(--cell-spec);
      border-color: rgba(255, 184, 0, .3)
    }

    .dc.spec:hover {
      background: var(--cell-spec-hover)
    }

    .dc.today {
      box-shadow: 0 0 0 2px var(--red) inset !important
    }

    .dnum {
      font-size: 14px;
      font-weight: 700;
      color: var(--hi);
      line-height: 1
    }

    .dc.off .dnum {
      color: var(--txt4)
    }

    .star-lbl {
      position: absolute;
      top: 7px;
      right: 7px;
      font-size: 9px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: .2px
    }

    .dots-area {
      margin-top: auto;
      padding-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .dots {
      display: flex;
      flex-wrap: wrap;
      gap: 3px
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: opacity .15s, transform .15s;
      box-shadow: 0 0 0 1.5px var(--dot-border)
    }

    .dot:hover {
      transform: scale(1.3)
    }

    .dot.faded {
      opacity: .1
    }

    .dot-instagram {
      background: var(--ig)
    }

    .dot-tiktok {
      background: var(--tt)
    }

    .dot-x {
      background: var(--xc)
    }

    .dot-whatsapp {
      background: var(--wa)
    }

    .dcount {
      font-size: 9px;
      font-weight: 600;
      color: var(--txt3);
      letter-spacing: .2px
    }

    /* ── PANEL / DRAWER ── */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none
    }

    .backdrop.open {
      pointer-events: all
    }

    .panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 460px;
      background: var(--surf);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
      transform: translateX(110%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 201;
      overflow: hidden
    }

    .backdrop.open .panel {
      transform: translateX(0)
    }

    .mhdr {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0
    }

    .mdate {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .mbig {
      font-size: 48px;
      font-weight: 800;
      color: var(--hi);
      line-height: 1;
      flex-shrink: 0;
      letter-spacing: -2px
    }

    .minfo {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .mwd {
      font-size: 11px;
      color: var(--txt2);
      text-transform: uppercase;
      letter-spacing: .5px;
      font-weight: 600
    }

    .mmy {
      font-size: 15px;
      font-weight: 700;
      color: var(--txt)
    }

    .mbadges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px
    }

    .bph {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 9999px;
      letter-spacing: .3px
    }

    .bp1 {
      background: rgba(255, 184, 0, .12);
      color: var(--gold)
    }

    .bp2 {
      background: rgba(255, 92, 0, .15);
      color: var(--orange)
    }

    .bp3 {
      background: rgba(0, 212, 106, .15);
      color: var(--green)
    }

    .bsp {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 9999px;
      background: rgba(255, 184, 0, .12);
      color: var(--gold)
    }

    .cbtn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--txt2);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s
    }

    .cbtn:hover {
      background: rgba(255, 184, 0, .08);
      border-color: var(--gold);
      color: var(--hi)
    }

    .mposts {
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .mpost {
      display: flex;
      gap: 14px;
      padding: 14px;
      border-radius: var(--r-lg);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-left: 5px solid transparent;
      transition: background .15s, border-color .15s, transform .15s
    }

    .mpost:hover {
      background: var(--surf3);
      transform: translateX(2px)
    }

    .mpost.hide {
      display: none
    }

    .mpost[data-ch=instagram] {
      border-left-color: var(--ig)
    }

    .mpost[data-ch=tiktok] {
      border-left-color: var(--tt)
    }

    .mpost[data-ch=x] {
      border-left-color: var(--xc)
    }

    .mpost[data-ch=whatsapp] {
      border-left-color: var(--wa)
    }

    /* ── Trilha do canal (ícone + nome em destaque) ── */
    .mpost-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex-shrink: 0;
      width: 68px;
      padding: 10px 4px;
      border-radius: var(--r);
    }

    .mpost[data-ch=instagram] .mpost-rail {
      background: rgba(214, 52, 128, .14)
    }

    .mpost[data-ch=tiktok] .mpost-rail {
      background: rgba(91, 207, 220, .12)
    }

    .mpost[data-ch=x] .mpost-rail {
      background: rgba(255, 255, 255, .08)
    }

    .mpost[data-ch=whatsapp] .mpost-rail {
      background: rgba(37, 211, 102, .14)
    }

    .picon {
      width: 46px;
      height: 46px;
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .35);
      flex-shrink: 0
    }

    .picon svg {
      width: 24px;
      height: 24px
    }

    .picon.instagram {
      background: var(--ig-bg)
    }

    .picon.tiktok {
      background: var(--tt-bg);
      border: 1px solid #2a2a2a
    }

    .picon.x {
      background: var(--xc-bg);
      border: 1px solid #222
    }

    .picon.whatsapp {
      background: var(--wa-bg)
    }

    .plbl {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .4px;
      text-align: center
    }

    .plbl.instagram {
      color: var(--ig)
    }

    .plbl.tiktok {
      color: var(--tt)
    }

    .plbl.x {
      color: var(--hi)
    }

    .plbl.whatsapp {
      color: var(--wa)
    }

    /* ── Horário sugerido: destaque + alerta de urgência ── */
    .ptime-badge {
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: .2px;
      padding: 3px 9px;
      border-radius: 9999px;
      background: rgba(255, 184, 0, .15);
      color: var(--gold);
      white-space: nowrap
    }

    .ptime-badge.soon {
      background: rgba(255, 92, 0, .22);
      color: var(--orange);
      animation: pulse-alert 1.4s ease-in-out infinite
    }

    .ptime-badge.due {
      background: var(--red);
      color: #fff;
      animation: pulse-alert 1.1s ease-in-out infinite
    }

    @keyframes pulse-alert {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .55
      }
    }

    .ptxt {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    /* ── Topo do corpo: badge de tipo + badge de status, lado a lado ── */
    .mpost-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap
    }

    .ptype-badge {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 4px 12px;
      border-radius: 9999px;
      flex-shrink: 0
    }

    .ptype-badge.instagram {
      background: rgba(214, 52, 128, .18);
      color: #ff7fbb
    }

    .ptype-badge.tiktok {
      background: rgba(91, 207, 220, .16);
      color: var(--tt)
    }

    .ptype-badge.x {
      background: #fff;
      color: #000
    }

    .ptype-badge.whatsapp {
      background: rgba(37, 211, 102, .16);
      color: var(--wa)
    }

    .pdesc {
      font-size: 14px;
      color: var(--txt);
      line-height: 1.5
    }

    .pnote {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 5px;
      font-style: italic;
      padding-top: 5px;
      border-top: 1px solid var(--border)
    }

    /* ── POST FOOTER: utm, arte ── */
    .pfoot {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px
    }

    .pstatus {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 9999px;
      letter-spacing: .3px;
      flex-shrink: 0
    }

    .paprov {
      font-size: 12px;
      color: var(--txt3)
    }

    .paprov strong {
      color: var(--txt2);
      font-weight: 600
    }

    .pst-ideia {
      background: rgba(255, 255, 255, .1);
      color: var(--txt2)
    }

    .pst-producao {
      background: rgba(255, 92, 0, .15);
      color: var(--orange)
    }

    .pst-aprovado {
      background: rgba(0, 212, 106, .15);
      color: var(--green)
    }

    .pst-publicado {
      background: rgba(255, 184, 0, .15);
      color: var(--gold)
    }

    .parte-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: var(--r);
      background: transparent;
      color: var(--txt2);
      text-decoration: none;
      border: 1px solid var(--border2);
      letter-spacing: .3px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s
    }

    .parte-btn.utm:hover {
      background: rgba(255, 184, 0, .1);
      border-color: var(--gold);
      color: var(--hi)
    }

    .parte-btn.utm .copy-ico {
      flex-shrink: 0
    }

    .parte-btn.utm.copied {
      background: rgba(0, 212, 106, .15);
      border-color: var(--green);
      color: var(--green)
    }

    .parte-btn.arte {
      background: rgba(255, 92, 0, .12);
      border-color: rgba(255, 92, 0, .35);
      color: var(--orange)
    }

    .parte-btn.arte:hover {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff
    }

    .mempty {
      text-align: center;
      padding: 30px;
      color: var(--txt3);
      font-size: 13px;
      display: none
    }

    /* ── LOADING ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      color: var(--txt3);
      font-size: 14px
    }

    .loading-spin {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid var(--border2);
      border-top-color: var(--red);
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .load-err {
      color: var(--txt2);
      font-size: 13px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6
    }

    .load-err a {
      color: var(--red);
      text-decoration: underline;
      cursor: pointer
    }

    /* Mobile */
    @media(max-width:640px) {
      .widgets {
        grid-template-columns: repeat(2, 1fr);
        padding: 10px;
        gap: 8px
      }

      .widget {
        padding: 10px;
        gap: 8px
      }

      .w-big {
        font-size: 19px
      }

      .cal {
        padding: 10px
      }

      .dc {
        min-height: 58px;
        padding: 5px
      }

      .dc.blank {
        min-height: 58px
      }

      .dnum {
        font-size: 12px
      }

      .dot {
        width: 7px;
        height: 7px
      }

      .dcount {
        display: none
      }

      .star-lbl {
        font-size: 8px
      }

      .mbig {
        font-size: 36px
      }

      .panel {
        width: 100%;
        top: auto;
        height: 88vh;
        border-left: none;
        border-radius: var(--r-lg) var(--r-lg) 0 0;
        box-shadow: 0 -8px 32px rgba(0,0,0,.4);
        transform: translateY(110%)
      }

      .backdrop.open .panel {
        transform: translateY(0)
      }

      .backdrop.open::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.65);
        z-index: 200
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-left">
        <span class="logo">CazéTV</span>
        <span style="color:var(--border2)">×</span>
        <span>
          <span class="htitle">Calendário de Posts</span>
          <span class="hsub"> · Copa 2026 · 16 Jun – 19 Jul</span>
        </span>
      </div>
    </div>
    <div class="filters">
      <button class="fb on" data-ch="all" onclick="setFilter('all')"><span class="fdot fd-all"></span>Todos</button>
      <button class="fb" data-ch="instagram" onclick="setFilter('instagram')"><span
          class="fdot fd-ig"></span>Instagram</button>
      <button class="fb" data-ch="tiktok" onclick="setFilter('tiktok')"><span class="fdot fd-tt"></span>TikTok</button>
      <button class="fb" data-ch="x" onclick="setFilter('x')"><span class="fdot fd-x"></span>X (Twitter)</button>
      <button class="fb" data-ch="whatsapp" onclick="setFilter('whatsapp')"><span
          class="fdot fd-wa"></span>WhatsApp</button>
    </div>
  </div>

  <!-- WIDGETS -->
  <div class="widgets" id="widgets">
    <div class="widget w-overall">
      <div class="w-label">Total do calendário</div>
      <div class="w-big"><span id="w-total-done">0</span><span class="w-sep">/</span><span class="w-all" id="w-total-all">0</span></div>
      <div class="w-sub">publicados / planejados</div>
      <div class="w-bar"><div class="w-bar-fill" id="w-total-fill" style="background:linear-gradient(90deg,var(--orange),var(--gold))"></div></div>
    </div>
    <div class="widget" data-ch="instagram">
      <div class="picon sm instagram" data-icon="instagram"></div>
      <div class="w-body">
        <div class="w-label">Instagram</div>
        <div class="w-big"><span id="w-ig-done">0</span><span class="w-sep">/</span><span class="w-all" id="w-ig-all">0</span></div>
        <div class="w-bar"><div class="w-bar-fill" id="w-ig-fill" style="background:var(--ig)"></div></div>
      </div>
    </div>
    <div class="widget" data-ch="tiktok">
      <div class="picon sm tiktok" data-icon="tiktok"></div>
      <div class="w-body">
        <div class="w-label">TikTok</div>
        <div class="w-big"><span id="w-tt-done">0</span><span class="w-sep">/</span><span class="w-all" id="w-tt-all">0</span></div>
        <div class="w-bar"><div class="w-bar-fill" id="w-tt-fill" style="background:var(--tt)"></div></div>
      </div>
    </div>
    <div class="widget" data-ch="x">
      <div class="picon sm x" data-icon="x"></div>
      <div class="w-body">
        <div class="w-label">X</div>
        <div class="w-big"><span id="w-x-done">0</span><span class="w-sep">/</span><span class="w-all" id="w-x-all">0</span></div>
        <div class="w-bar"><div class="w-bar-fill" id="w-x-fill" style="background:var(--xc)"></div></div>
      </div>
    </div>
    <div class="widget" data-ch="whatsapp">
      <div class="picon sm whatsapp" data-icon="whatsapp"></div>
      <div class="w-body">
        <div class="w-label">WhatsApp</div>
        <div class="w-big"><span id="w-wa-done">0</span><span class="w-sep">/</span><span class="w-all" id="w-wa-all">0</span></div>
        <div class="w-bar"><div class="w-bar-fill" id="w-wa-fill" style="background:var(--wa)"></div></div>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading-wrap" id="loading">
    <div class="loading-spin"></div>
    <span>Carregando calendário...</span>
  </div>

  <!-- CALENDAR -->
  <div class="cal" id="cal-wrap" style="display:none">
    <div id="june" class="month-block"></div>
    <div id="july" class="month-block"></div>
  </div>

  <!-- PANEL / DRAWER -->
  <div class="backdrop" id="bd">
    <div class="panel" id="panel">
      <div class="mhdr">
        <div class="mdate">
          <div class="mbig" id="m-d"></div>
          <div class="minfo">
            <div class="mwd" id="m-wd"></div>
            <div class="mmy" id="m-my"></div>
            <div class="mbadges" id="m-badges"></div>
          </div>
        </div>
        <button class="cbtn" onclick="closeModal()">✕</button>
      </div>
      <div class="mposts" id="m-posts"></div>
      <div class="mempty" id="m-empty">Nenhum post deste canal neste dia.</div>
    </div>
  </div>

  <script>
    // ── FONTE DE DADOS ─────────────────────────────────────────
    // Cole aqui a URL gerada pelo Apps Script após o deploy:
    // Extensões → Apps Script → Implantar → Nova implantação → Web app
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxEQ0l5QLh1OV-c1qBCn_ITGYcpTmMvPSm7tV8UV6FD59WcOabgoi0IkG0sZ4KJOP8mGQ/exec';

    let CFG = {}, DATA = [];

    // ── CONSTANTES ─────────────────────────────────────────────
    const PN = { 1: "Entrada na Comunidade", 2: "Contagem Regressiva", 3: "O Novo Bolão" };
    const PC = { 1: "#ffb800", 2: "#ff5c00", 3: "#00d46a" };
    const WD = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
    const WDF = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
    const MF = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const CI = {
      instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1.15" fill="#fff" stroke="none"/></svg>`,
      tiktok: `<svg viewBox="0 0 24 24" fill="#fff"><path d="M16.6 5.82a4.28 4.28 0 0 1-3.78-3.77h-3.07v13.66a2.6 2.6 0 1 1-1.83-2.48v-3.1a5.65 5.65 0 1 0 4.9 5.6V9.4a7.34 7.34 0 0 0 4.28 1.36V7.62a4.85 4.85 0 0 1-.5-1.8z"/></svg>`,
      x: `<svg viewBox="0 0 24 24" fill="#fff"><path d="M18.9 3H22l-7.2 8.2L22.6 21H16l-5-6.1L5 21H2l7.7-8.8L1.7 3H8.4l4.5 5.6L18.9 3z"/></svg>`,
      whatsapp: `<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2zm5.6 14.2c-.3.8-1.6 1.5-2.5 1.6-.7.1-1.4 0-2.7-.5-2.3-.9-3.8-3.2-3.9-3.3-.1-.2-1-1.3-1-2.5s.6-1.8.8-2c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.5.7 1.7.7 1.8.1.1.1.3 0 .4-.3.6-.6.9-.8 1.2-.1.1-.2.3 0 .5.5.9 1.1 1.6 1.9 2.1.3.2.5.2.7 0 .3-.3.7-.8 1-1.2.2-.3.4-.3.7-.2l1.6.8c.2.1.4.2.4.4.1.2.1.7-.2 1.5z"/></svg>`
    };
    const CL = { instagram: "Instagram", tiktok: "TikTok", x: "X", whatsapp: "WhatsApp" };
    document.querySelectorAll('.picon.sm[data-icon]').forEach(el => { el.innerHTML = CI[el.dataset.icon]; });

    // Mapeamento de status → classe CSS
    const ST_CLS = {
      'Ideia': 'pst-ideia', 'Em produção': 'pst-producao',
      'Aprovado': 'pst-aprovado', 'Publicado': 'pst-publicado'
    };

    // ── BRT (horário de Brasília) ───────────────────────────────
    // Todo "horário sugerido" é em BRT, então comparamos com a hora
    // atual em BRT (e não no fuso de quem está com a página aberta).
    const BRT_TZ = 'America/Sao_Paulo';
    function brtParts(date = new Date()) {
      const parts = {};
      new Intl.DateTimeFormat('en-CA', {
        timeZone: BRT_TZ, year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).formatToParts(date).forEach(p => { if (p.type !== 'literal') parts[p.type] = p.value; });
      return parts;
    }
    function brtDateKey(date) { const p = brtParts(date); return `${p.year}-${p.month}-${p.day}`; }
    function brtNowMinutes() { const p = brtParts(); return Number(p.hour) * 60 + Number(p.minute); }

    const TODAY = brtDateKey();
    let filter = 'all', openDate = null;

    // ── HORÁRIO SUGERIDO: classifica urgência pra alertar o time ──
    function classifyTime(dateKey, hhmm, status) {
      if (!hhmm) return null;
      if (status === 'Publicado' || dateKey !== TODAY) {
        return { cls: '', label: `🕒 ${hhmm}` };
      }
      const [h, m] = hhmm.split(':').map(Number);
      const diff = (h * 60 + m) - brtNowMinutes();
      if (diff > 30) return { cls: '', label: `🕒 ${hhmm}`, title: 'Horário sugerido' };
      if (diff > 0) return { cls: 'soon', label: `⏰ ${hhmm}`, title: `Daqui a ${diff}min — prepare o post` };
      if (diff > -60) return { cls: 'due', label: `🔴 ${hhmm}`, title: 'Hora de subir o post!' };
      return { cls: 'due', label: `⚠️ ${hhmm}`, title: 'Atrasado — horário sugerido já passou' };
    }

    function refreshTimeBadges() {
      document.querySelectorAll('.ptime-badge').forEach(el => {
        const info = classifyTime(el.dataset.date, el.dataset.time, el.dataset.status);
        if (!info) return;
        el.className = 'ptime-badge' + (info.cls ? ' ' + info.cls : '');
        el.textContent = info.label;
        el.title = info.title;
      });
    }
    setInterval(refreshTimeBadges, 30000);

    // ── HELPERS ────────────────────────────────────────────────
    function ds(y, m, d) { return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}` }
    function postsFor(date, ch) { return DATA.filter(p => p.d === date && (ch === 'all' || p.c === ch)) }
    function chsFor(date) { return [...new Set(DATA.filter(p => p.d === date).map(p => p.c))] }

    // ── FILTROS ────────────────────────────────────────────────
    function setFilter(ch) {
      filter = ch;
      document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
      document.querySelector(`[data-ch="${ch}"]`).classList.add('on');
      refreshDots();
      updateStats();
      if (openDate) openModal(openDate);
    }

    function setWidget(prefix, total, done) {
      document.getElementById(`w-${prefix}-done`).textContent = done;
      document.getElementById(`w-${prefix}-all`).textContent = total;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById(`w-${prefix}-fill`).style.width = `${pct}%`;
    }

    function updateStats() {
      const all = DATA.filter(p => CFG[p.d]);
      const done = p => p.status === 'Publicado';
      setWidget('total', all.length, all.filter(done).length);
      ['ig:instagram', 'tt:tiktok', 'x:x', 'wa:whatsapp'].forEach(pair => {
        const [prefix, ch] = pair.split(':');
        const chPosts = all.filter(p => p.c === ch);
        setWidget(prefix, chPosts.length, chPosts.filter(done).length);
      });
    }

    // ── CALENDÁRIO ─────────────────────────────────────────────
    function buildMonth(y, m, id) {
      const el = document.getElementById(id);
      const first = new Date(y, m, 1).getDay();
      const days = new Date(y, m + 1, 0).getDate();
      const phases = new Set();
      for (let i = 1; i <= days; i++) { const c = CFG[ds(y, m, i)]; if (c) phases.add(c.p) }
      const phBar = [...phases].sort().map(p => `<div class="pb-item"><div class="pb-swatch" style="background:${PC[p]}"></div><span>${PN[p]}</span></div>`).join('');
      el.innerHTML = `
    <div class="month-title">${MF[m]} ${y}</div>
    <div class="phase-bar">${phBar}</div>
    <div class="wd-row">${WD.map(w => `<div class="wd">${w}</div>`).join('')}</div>
    <div class="days" id="g-${id}"></div>`;
      const grid = el.querySelector('.days');
      for (let i = 0; i < first; i++) { const b = document.createElement('div'); b.className = 'dc blank'; grid.appendChild(b) }
      for (let d = 1; d <= days; d++) {
        const date = ds(y, m, d);
        const cfg = CFG[date];
        const cell = document.createElement('div');
        if (!cfg) {
          cell.className = 'dc off';
          cell.innerHTML = `<span class="dnum">${d}</span>`;
        } else {
          const chs = chsFor(date);
          const total = DATA.filter(p => p.d === date).length;
          const cls = ['dc', 'on', `p${cfg.p}`];
          if (cfg.s) cls.push('spec');
          if (date === TODAY) cls.push('today');
          cell.className = cls.join(' ');
          cell.dataset.date = date;
          cell.innerHTML = `
        <span class="dnum">${d}</span>
        ${cfg.s ? `<span class="star-lbl">★</span>` : ''}
        <div class="dots-area">
          <div class="dots" id="dots-${date}">${chs.map(ch => `<span class="dot dot-${ch}" data-ch="${ch}" title="${CL[ch]}"></span>`).join('')}</div>
          <div class="dcount" id="cnt-${date}">${total} post${total !== 1 ? 's' : ''}</div>
        </div>`;
          cell.addEventListener('click', () => openModal(date));
        }
        grid.appendChild(cell);
      }
    }

    function refreshDots() {
      Object.keys(CFG).forEach(date => {
        const dotsEl = document.getElementById(`dots-${date}`);
        const cntEl = document.getElementById(`cnt-${date}`);
        const cell = dotsEl?.closest('.dc');
        if (!dotsEl) return;
        dotsEl.querySelectorAll('.dot').forEach(dot => {
          dot.classList.toggle('faded', filter !== 'all' && dot.dataset.ch !== filter);
        });
        const vis = postsFor(date, filter).length;
        const tot = DATA.filter(p => p.d === date).length;
        if (cntEl) cntEl.textContent = filter === 'all' ? `${tot} post${tot !== 1 ? 's' : ''}` : (vis > 0 ? `${vis} post${vis !== 1 ? 's' : ''}` : '—');
        if (cell) cell.style.opacity = (vis > 0 || filter === 'all') ? '1' : '0.3';
      });
    }

    // ── MODAL ──────────────────────────────────────────────────
    function openModal(date) {
      openDate = date;
      const cfg = CFG[date];
      const dt = new Date(date + 'T12:00:00');
      document.getElementById('m-d').textContent = dt.getDate();
      document.getElementById('m-wd').textContent = WDF[dt.getDay()];
      document.getElementById('m-my').textContent = `${MF[dt.getMonth()]} ${dt.getFullYear()}`;
      const bpc = { 1: 'bp1', 2: 'bp2', 3: 'bp3' };
      document.getElementById('m-badges').innerHTML =
        `<span class="bph ${bpc[cfg.p]}">${PN[cfg.p]}</span>` +
        (cfg.s ? `<span class="bsp">${cfg.s}</span>` : '');
      const allPosts = DATA.filter(p => p.d === date);
      const vis = postsFor(date, filter);
      document.getElementById('m-posts').innerHTML = allPosts.map(p => {
        const show = filter === 'all' || p.c === filter;
        const stCls = ST_CLS[p.status] || '';
        const hasLinks = p.utm || p.arte;
        const timeInfo = classifyTime(p.d, p.horario, p.status);
        return `<div class="mpost${show ? '' : ' hide'}" data-ch="${p.c}">
      <div class="mpost-rail">
        <div class="picon ${p.c}">${CI[p.c]}</div>
        <span class="plbl ${p.c}">${CL[p.c]}</span>
        ${timeInfo ? `<div class="ptime-badge${timeInfo.cls ? ' ' + timeInfo.cls : ''}" data-date="${p.d}" data-time="${p.horario}" data-status="${p.status || ''}" title="${timeInfo.title}">${timeInfo.label}</div>` : ''}
      </div>
      <div class="ptxt">
        <div class="mpost-top">
          <span class="ptype-badge ${p.c}">${p.t}</span>
          ${p.status && stCls ? `<span class="pstatus ${stCls}">${p.status}</span>` : ''}
        </div>
        ${p.tx ? `<div class="pdesc">${p.tx}</div>` : ''}
        ${p.aprov ? `<div class="paprov">Aprovação: <strong>${p.aprov}</strong></div>` : ''}
        ${hasLinks ? `<div class="pfoot">
          ${p.utm ? `<button class="parte-btn utm" type="button" data-utm="${p.utm}" title="Copiar link UTM">
            <svg class="copy-ico" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            UTM
          </button>` : ''}
          ${p.arte ? `<a class="parte-btn arte" href="${p.arte}" target="_blank" rel="noopener">Ver arte ↗</a>` : ''}
        </div>`: ''}
      </div>
    </div>`;
      }).join('');
      document.getElementById('m-empty').style.display = vis.length === 0 ? 'block' : 'none';
      document.getElementById('bd').classList.add('open');
      if (window.innerWidth < 900) document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      openDate = null;
      document.getElementById('bd').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('bd').addEventListener('click', e => {
      if (!e.target.closest('#panel')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() });

    // ── COPIAR LINK UTM ────────────────────────────────────────
    document.getElementById('m-posts').addEventListener('click', async e => {
      const btn = e.target.closest('.parte-btn.utm');
      if (!btn) return;
      const url = btn.dataset.utm;
      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      if (btn.dataset.resetTimer) clearTimeout(Number(btn.dataset.resetTimer));
      const original = btn.innerHTML;
      btn.classList.add('copied');
      btn.innerHTML = '✓ Copiado!';
      const t = setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = original;
      }, 1600);
      btn.dataset.resetTimer = t;
    });

    // ── INIT: busca dados do Google Sheets ─────────────────────
    async function init() {
      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        // Apps Script retorna datas do Config como objetos Date serializados
        // (ex: "Tue Jun 16 2026 00:00:00 GMT-0300..."). Normaliza para YYYY-MM-DD.
        const rawCfg = json.cfg;
        CFG = {};
        Object.keys(rawCfg).forEach(key => {
          const iso = /^\d{4}-\d{2}-\d{2}$/.test(key) ? key : (() => {
            const d = new Date(key);
            if (isNaN(d)) return key;
            const y = d.getUTCFullYear();
            const m = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dy = String(d.getUTCDate()).padStart(2, '0');
            return `${y}-${m}-${dy}`;
          })();
          CFG[iso] = rawCfg[key];
        });
        DATA = json.posts.map(p => ({
          d: p.data, c: p.canal, t: p.formato,
          utm: p.utm || undefined,
          arte: p.link_arte || undefined,
          tx: p.comunicacao || undefined,
          aprov: p.aprovacao || undefined,
          status: p.status || undefined,
          horario: p.horario_sugerido || undefined
        }));
        document.getElementById('loading').style.display = 'none';
        document.getElementById('cal-wrap').style.display = 'block';
        buildMonth(2026, 5, 'june');
        buildMonth(2026, 6, 'july');
        updateStats();
      } catch (e) {
        const el = document.getElementById('loading');
        el.innerHTML = `<div class="load-err">
      Não foi possível carregar os dados.<br>
      Verifique se a URL do Apps Script está configurada no HTML e recarregue.<br><br>
      <a onclick="location.reload()">Tentar novamente</a>
    </div>`;
      }
    }
    init();
  </script>
</body>

</html>
